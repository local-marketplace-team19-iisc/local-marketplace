server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: client-side routing handled by react-router.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache hashed static assets aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
