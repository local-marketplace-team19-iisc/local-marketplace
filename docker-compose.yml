services:
  backend:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      PORT: 8000
    depends_on:
      db:
        condition: service_healthy

  db:
    build:
      context: .
      dockerfile: backend/db/Dockerfile
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marketplace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketplace}
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marketplace} -d ${POSTGRES_DB:-marketplace}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
