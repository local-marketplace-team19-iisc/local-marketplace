services:
  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: local_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d local_marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/local_marketplace
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
